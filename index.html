<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Střední škola polytechnická Hustopeče</title>
<style>
  :root {
    --akcent: #00a2e8;          /* hlavní barva widgetu */
    --akcent-tmavy: #0084bd;    /* tmavší odstín pro hover */
    --akcent-svetly: #e6f6fd;   /* světlé pozadí pod logem */
    --text: #1a2b3c;
    --text-tlumeny: #5b6b7a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* widget je stavěný na iframe 1188 x 175 px, vyplní ho celý */
  html, body {
    height: 100%;
    overflow: hidden;           /* žádné scrollbary uvnitř iframe */
    background: transparent;    /* v iframe splyne s webem */
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    color: var(--text);
  }

  .wrap {
    height: 100%;
    padding: 10px 12px;
    display: flex;
  }

  /* celá karta je jeden odkaz */
  .karta {
    flex: 1 1 auto;
    display: flex;
    align-items: center;
    gap: 22px;
    padding: 14px 24px;
    border-radius: 14px;
    background: #fff;
    border: 1px solid #dce9f0;
    border-left: 6px solid var(--akcent);
    box-shadow: 0 3px 10px rgba(0,0,0,.09);
    text-decoration: none;
    color: inherit;
    transition: transform .15s ease, box-shadow .15s ease;
  }

  .karta:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 14px rgba(0,0,0,.16);
  }

  .karta:focus-visible {
    outline: 3px solid var(--akcent);
    outline-offset: 2px;
  }

  .logo {
    flex: 0 0 auto;
    width: 150px;
    height: 118px;              /* pevná výška, ať se karta vejde do 175 px */
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--akcent-svetly);
    border-radius: 12px;
    padding: 10px 14px;
  }

  .logo img {
    max-width: 100%;
    max-height: 100%;
    display: block;
  }

  .obsah { flex: 1 1 auto; min-width: 0; }

  .nazev {
    display: block;
    font-size: 1.25rem;
    font-weight: 700;
    line-height: 1.2;
  }

  .podtitul {
    display: block;
    margin-top: 2px;
    font-size: .85rem;
    color: var(--text-tlumeny);
  }

  .popis {
    margin-top: 8px;
    font-size: .92rem;
    line-height: 1.4;
    color: var(--text-tlumeny);
  }

  .prava {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 12px 22px;
    border-radius: 10px;
    background: var(--akcent);
    color: #fff;
    font-size: .95rem;
    font-weight: 600;
    white-space: nowrap;
    transition: background .15s ease;
  }

  .karta:hover .cta { background: var(--akcent-tmavy); }

  .cta svg { flex: 0 0 auto; }

  .poznamka {
    margin-top: 6px;
    font-size: .72rem;
    color: var(--text-tlumeny);
    white-space: nowrap;
  }

  /* užší šířky (mobil): schovat popis a logo, ať se vejde do stejné výšky */
  @media (max-width: 900px) {
    .popis { display: none; }
  }

  @media (max-width: 640px) {
    .logo { display: none; }
    .karta { gap: 14px; padding: 12px 16px; }
    .nazev { font-size: 1.05rem; }
    .cta { padding: 10px 14px; font-size: .85rem; }
    .poznamka { display: none; }
  }
</style>
</head>
<body>

<div class="wrap">
  <a class="karta" href="https://hustopecess.edupage.org/" target="_blank" rel="noopener">
    <span class="logo">
      <img src="logo.png" alt="Logo Střední školy polytechnické Hustopeče">
    </span>
    <span class="obsah">
      <span class="nazev">Střední škola polytechnická Hustopeče</span>
      <span class="podtitul">příspěvková organizace</span>
      <p class="popis">Aktuality ze života školy, studijní obory, rozvrhy a suplování najdete na oficiálním webu školy.</p>
    </span>
    <span class="prava">
      <span class="cta">
        Přejít na web školy
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </span>
      <span class="poznamka">Odkaz se otevře v novém okně.</span>
    </span>
  </a>
</div>

</body>
</html>
